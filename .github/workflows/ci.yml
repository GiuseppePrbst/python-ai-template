name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: quality (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync dependencies (locked)
        run: uv sync --locked
      - name: Run quality gates
        run: uv run python tools/ai/verify.py

  package:
    name: package
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Setup uv and Python 3.12
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync dependencies (locked)
        run: uv sync --locked
      - name: Clean previous build artifacts
        run: rm -rf dist
      - name: Build wheel and sdist
        run: uv build
      - name: Verify wheel
        run: uv run python tools/ai/verify_wheel.py
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14
